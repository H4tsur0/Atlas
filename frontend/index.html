<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT ATLAS — ACCESS</title>
    <link rel="stylesheet" href="css/swiss.css">
</head>
<body>
    <main style="max-width: 450px; margin: 10vh auto;">
        <h1>Atlas Access</h1>
        <form id="loginForm" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <label style="font-family: monospace; font-size: 0.85rem; display: block; margin-bottom: 0.5rem;">IDENTITY // EMAIL</label>
                <input type="email" id="email" required style="width: 100%; background: #121212; border: 1px solid #222; color: #fff; padding: 0.75rem; font-size: 1rem;">
            </div>
            <div>
                <label style="font-family: monospace; font-size: 0.85rem; display: block; margin-bottom: 0.5rem;">CREDENTIAL // PASSWORD</label>
                <input type="password" id="password" required style="width: 100%; background: #121212; border: 1px solid #222; color: #fff; padding: 0.75rem; font-size: 1rem;">
            </div>
            <button type="submit" class="mode-toggle-btn" style="width: 100%; padding: 1rem;">Authenticate</button>
            <p id="authFeedback" style="font-family: monospace; font-size: 0.85rem; color: var(--accent-color);"></p>
        </form>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
